version: 1

metadata:
  name: dns
  profiles: [core, compute, control-plane, dns]
  priority: 2
  managed_unit: true
  provides_capabilities: [dns]
  runtime_local_dependencies: [event]
  health_check:
    unit: globular-dns.service
    port: 10006

service:
  name: dns
  exec: dns_server

steps:
  - id: stage-dns-package
    type: stage_package
    path: "internal/assets/packages/service.dns_{{.Version}}_linux_amd64.tgz"
    require_platform_match: true
    require_type_service: true

  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: globular
        group: globular
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: globular
        group: globular
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/dns"
        owner: globular
        group: globular
        mode: 0750

  - id: install-dns-payload
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: ensure-dns-config
    type: ensure_service_config
    service_name: dns
    exec: dns_server
    address_host: auto
    rewrite_if_out_of_range: true

  - id: install-dns-service
    type: install_services
    units:
      - name: globular-dns.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular dns
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/dns
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          ExecStart={{.Prefix}}/bin/dns_server
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-dns
    type: enable_services
    services:
      - globular-dns.service

  - id: start-dns
    type: start_services
    services:
      - globular-dns.service
    binaries:
      globular-dns.service: dns_server

  - id: health-dns
    type: health_checks
    services:
      - globular-dns.service
