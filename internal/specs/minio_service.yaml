version: 1
steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/minio"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/minio/data"
        owner: globular
        group: globular
        mode: 0750

      - path: "{{.ConfigDir}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.ConfigDir}}/minio"
        owner: root
        group: root
        mode: 0755

  # Stages the service package (created with `globular-cli pkg build`) into the installer staging directory.
  # NOTE: pass --version to globular-installer so {{.Version}} matches the package filename.
  - id: stage-minio-package
    type: stage_package
    path: "internal/assets/packages/service.minio_{{.Version}}_linux_amd64.tgz"
    require_platform_match: true
    require_type_service: true

  # Installs only binaries from the staged package into {{.Prefix}}/bin.
  # Config/systemd/spec are still installed from this spec because package payload files are copied verbatim (no templating).
  - id: install-minio-bin
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: install-minio-config
    type: install_files
    files:
      - path: "{{.ConfigDir}}/minio/minio.env"
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          MINIO_ROOT_USER=globular
          MINIO_ROOT_PASSWORD=globularadmin
          MINIO_VOLUMES={{.StateDir}}/minio/data
          MINIO_OPTS=--address 127.0.0.1:9000 --console-address 127.0.0.1:9001

  - id: install-minio-service
    type: install_services
    units:
      - name: globular-minio.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular MinIO (embedded)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/minio
          EnvironmentFile={{.ConfigDir}}/minio/minio.env
          ExecStart={{.Prefix}}/bin/minio server $MINIO_OPTS $MINIO_VOLUMES
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: start-minio
    type: start_services
    services:
      - globular-minio.service
    restart_on_files:
      globular-minio.service:
        - "{{.ConfigDir}}/minio/minio.env"
    binaries:
      globular-minio.service: minio

  - id: health-minio
    type: health_checks
    services:
      - globular-minio.service

