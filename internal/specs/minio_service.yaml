version: 1
steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/minio"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/minio/data"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/objectstore"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/webroot"
        owner: globular
        group: globular
        mode: 0755

      # TLS directories (INV-PKI-1: canonical paths)
      - path: "{{.StateDir}}/pki"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/.minio/certs"
        owner: globular
        group: globular
        mode: 0750

  - id: install-minio-binaries
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: install-minio-config
    type: install_files
    files:
      - path: "{{.StateDir}}/minio/minio.env"
        owner: globular
        group: globular
        mode: 0644
        atomic: true
        content: |
          MINIO_ROOT_USER=globular
          MINIO_ROOT_PASSWORD=globularadmin
          MINIO_VOLUMES={{.StateDir}}/minio/data

          # TLS Configuration - MinIO will use certificates from ${HOME}/.minio/certs
          # For 'globular' user, this is {{.StateDir}}/.minio/certs
          # Certificates must be named: public.crt and private.key
          MINIO_CERT_FILE={{.StateDir}}/.minio/certs/public.crt
          MINIO_KEY_FILE={{.StateDir}}/.minio/certs/private.key

          # Bind addresses (will serve HTTPS when certs are present)
          MINIO_OPTS=--address 127.0.0.1:9000 --console-address 127.0.0.1:9001

  # Standard credentials file for clients (node-agent, gateway, etc.)
  - id: install-minio-credentials
    type: install_files
    files:
      - path: "{{.StateDir}}/minio/credentials"
        owner: globular
        group: globular
        mode: 0600
        atomic: true
        content: |
          globular:globularadmin

  - id: install-minio-service
    type: install_services
    units:
      - name: globular-minio.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular MinIO
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          ExecStartPre=+/usr/bin/mkdir -p {{.StateDir}}/minio {{.StateDir}}/minio/data
          ExecStartPre=+/usr/bin/chown -R globular:globular {{.StateDir}}/minio
          ExecStartPre=+/usr/bin/chmod 0700 {{.StateDir}}/minio
          ExecStartPre=+/usr/bin/chmod 0700 {{.StateDir}}/minio/data
          ExecStartPre=/usr/bin/test -w {{.StateDir}}/minio/data
          EnvironmentFile=-{{.StateDir}}/minio/minio.env
          ExecStart={{.Prefix}}/bin/minio server {{.StateDir}}/minio/data --address 127.0.0.1:9000 --console-address 127.0.0.1:9001
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-minio
    type: enable_services
    services:
      - globular-minio.service

  - id: start-minio
    type: start_services
    services:
      - globular-minio.service
    restart_on_files:
      globular-minio.service:
        - "{{.StateDir}}/minio/minio.env"
    binaries:
      globular-minio.service: minio

  - id: health-minio
    type: health_checks
    services:
      - globular-minio.service
