version: 1
steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750

      - path: "{{.ConfigDir}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.ConfigDir}}/envoy"
        owner: root
        group: root
        mode: 0755

  # Copies embedded assets/bin/* into {{.Prefix}}/bin (includes envoy)
  - id: install-binaries
    type: install_binaries

  # Installs the systemd unit for Envoy.
  - id: install-envoy-service
    type: install_services
    units:
      - name: globular-envoy.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular Envoy Proxy
          After=network-online.target globular-xds.service
          Wants=network-online.target globular-xds.service
          Requires=globular-xds.service

          [Service]
          Type=simple
          User=globular
          Group=globular
          ExecStartPre=/bin/sh -c 'rm -f /dev/shm/envoy_shared_memory_* || true'
          ExecStartPre=/bin/sh -c "install -d -m 0755 /run/globular/envoy"
          ExecStartPre=/bin/sh -c "for i in $(seq 1 60); do test -s /run/globular/envoy/envoy-bootstrap.json && exit 0; sleep 0.5; done; echo 'missing envoy bootstrap' >&2; exit 1"
          ExecStart={{.Prefix}}/bin/envoy --base-id 0 -c /run/globular/envoy/envoy-bootstrap.json
          Restart=on-failure
          RestartSec=2

          [Install]
          WantedBy=multi-user.target

  - id: start-envoy
    type: start_services
    services:
      - globular-envoy.service
    binaries:
      globular-envoy.service: envoy

  - id: health-envoy
    type: health_checks
    services:
      - globular-envoy.service
