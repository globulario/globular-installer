version: 1
steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750

      - path: "{{.ConfigDir}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.ConfigDir}}/envoy"
        owner: root
        group: root
        mode: 0755
      - path: "/run/globular"
        owner: globular
        group: globular
        mode: 0755
      - path: "/run/globular/envoy"
        owner: globular
        group: globular
        mode: 0755

  # Stages the service package (created with `globular-cli pkg build`) into the installer staging directory.
  # NOTE: pass --version to globular-installer so {{.Version}} matches the package filename.
  - id: stage-envoy-package
    type: stage_package
    path: "internal/assets/packages/service.envoy_{{.Version}}_linux_amd64.tgz"
    require_platform_match: true
    require_type_service: true

  # Installs only binaries from the staged package into {{.Prefix}}/bin.
  # Config/systemd/spec are still installed from this spec because package payload files are copied verbatim (no templating).
  - id: install-envoy-bin
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: install-envoy-service
    type: install_services
    units:
      - name: globular-envoy.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular Envoy (embedded)
          After=network-online.target globular-xds.service
          Wants=network-online.target globular-xds.service
          ConditionPathExists=/run/globular/envoy/envoy-bootstrap.json

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}
          AmbientCapabilities=CAP_NET_BIND_SERVICE
          CapabilityBoundingSet=CAP_NET_BIND_SERVICE
          NoNewPrivileges=true
          ExecStartPre=/bin/sh -c 'for i in $(seq 1 60); do [ -s /run/globular/envoy/envoy-bootstrap.json ] && exit 0; sleep 1; done; echo "envoy-bootstrap.json not ready"; exit 1'
          ExecStart={{.Prefix}}/bin/envoy -c /run/globular/envoy/envoy-bootstrap.json --log-level info
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: start-envoy
    type: start_services
    services:
      - globular-envoy.service
    binaries:
      globular-envoy.service: envoy

  - id: health-envoy
    type: health_checks
    services:
      - globular-envoy.service
