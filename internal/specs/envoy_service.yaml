version: 1

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0755
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750

      - path: "{{.LogDir}}"
        owner: globular
        group: globular
        mode: 0755
      - path: "{{.LogDir}}/envoy"
        owner: globular
        group: globular
        mode: 0755

      - path: "/run/globular"
        owner: globular
        group: globular
        mode: 0755
      - path: "/run/globular/envoy"
        owner: globular
        group: globular
        mode: 0755

  - id: install-envoy-bin
    type: install_binaries

  - id: install-envoy-service
    type: install_services
    units:
      - name: globular-envoy.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular Envoy Proxy
          After=network-online.target globular-xds.service
          Wants=network-online.target globular-xds.service
          Requires=globular-xds.service
          PartOf=globular-xds.service

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          AmbientCapabilities=CAP_NET_BIND_SERVICE
          CapabilityBoundingSet=CAP_NET_BIND_SERVICE
          NoNewPrivileges=true
          ExecStartPre=/bin/sh -c 'for i in $(seq 1 60); do [ -s /run/globular/envoy/envoy-bootstrap.json ] && exit 0; sleep 1; done; echo "envoy-bootstrap.json not ready"; exit 1'
          ExecStart={{.Prefix}}/bin/envoy -c /run/globular/envoy/envoy-bootstrap.json --log-level info
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

  - id: enable-envoy
    type: enable_services
    services:
      - globular-envoy.service

  - id: start-envoy
    type: start_services
    services:
      - globular-envoy.service
    binaries:
      globular-envoy.service: envoy

  - id: health-envoy
    type: health_checks
    services:
      - globular-envoy.service
