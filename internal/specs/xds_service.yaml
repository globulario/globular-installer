version: 1
steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/xds"
        owner: globular
        group: globular
        mode: 0750

      - path: "{{.ConfigDir}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.ConfigDir}}/xds"
        owner: root
        group: root
        mode: 0755
      - path: "/run/globular"
        owner: globular
        group: globular
        mode: 0755
      - path: "/run/globular/envoy"
        owner: globular
        group: globular
        mode: 0755

  # Stages the service package (created with `globular-cli pkg build`) into the installer staging directory.
  # NOTE: pass --version to globular-installer so {{.Version}} matches the package filename.
  - id: stage-xds-package
    type: stage_package
    path: "internal/assets/packages/service.xds_{{.Version}}_linux_amd64.tgz"
    require_platform_match: true
    require_type_service: true

  # Installs only binaries from the staged package into {{.Prefix}}/bin.
  # Config/systemd/spec are still installed from this spec because package payload files are copied verbatim (no templating).
  - id: install-xds-bin
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: install-xds-config
    type: install_files
    files:
      - path: "{{.ConfigDir}}/xds/xds.yaml"
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          server:
            address: 127.0.0.1
            port: 18000
          state_dir: "{{.StateDir}}"
          # embedded configs are injected via installer context:
          xds_config_json: '{{.XDSConfigJSON}}'
          gateway_config_json: '{{.GatewayConfigJSON}}'

  - id: install-xds-service
    type: install_services
    units:
      - name: globular-xds.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular xDS Control Plane (embedded)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}
          RuntimeDirectory=globular globular/envoy
          RuntimeDirectoryMode=0755
          RuntimeDirectoryPreserve=yes
          ExecStart={{.Prefix}}/bin/xds --config {{.ConfigDir}}/xds/xds.yaml
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: start-xds
    type: start_services
    services:
      - globular-xds.service
    restart_on_files:
      globular-xds.service:
        - "{{.ConfigDir}}/xds/xds.yaml"
    binaries:
      globular-xds.service: xds

  - id: health-xds
    type: health_checks
    services:
      - globular-xds.service
