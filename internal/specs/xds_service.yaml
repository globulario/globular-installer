version: 1
steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/xds"
        owner: globular
        group: globular
        mode: 0750

      - path: "/run/globular"
        owner: globular
        group: globular
        mode: 0755
      - path: "/run/globular/envoy"
        owner: globular
        group: globular
        mode: 0755

  # xds uses its own config format
  - id: install-xds-config
    type: install_files
    files:
      - path: "{{.StateDir}}/xds/xds.yaml"
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          server:
            address: 127.0.0.1
            port: 18000
          state_dir: "{{.StateDir}}"
          services_dir: "{{.StateDir}}/services"
          xds_config_json: '{}'
          gateway_config_json: '{}'

  # Install binaries/config from packaged payload when available.
  - id: install-xds-binary
    type: install_package_payload
    install_bins: true
    install_config: true
    install_spec: false
    install_systemd: false

  - id: install-xds-service
    type: install_services
    units:
      - name: globular-xds.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular xDS Control Plane
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/xds
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          RuntimeDirectory=globular globular/envoy
          RuntimeDirectoryMode=0755
          RuntimeDirectoryPreserve=yes
          ExecStart={{.Prefix}}/bin/xds --config {{.StateDir}}/xds/xds.yaml
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-xds
    type: enable_services
    services:
      - globular-xds.service

  - id: start-xds
    type: start_services
    services:
      - globular-xds.service
    restart_on_files:
      globular-xds.service:
        - "{{.StateDir}}/xds/xds.yaml"
    binaries:
      globular-xds.service: xds

  - id: health-xds
    type: health_checks
    services:
      - globular-xds.service
