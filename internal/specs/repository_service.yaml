version: 1

metadata:
  name: repository
  profiles: [core, compute]
  runtime_local_dependencies: [event]

service:
  name: repository
  exec: repository_server

steps:
  - id: stage-repository-package
    type: stage_package
    path: "internal/assets/packages/service.repository_{{.Version}}_linux_amd64.tgz"
    require_platform_match: true
    require_type_service: true

  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: globular
        group: globular
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: globular
        group: globular
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/repository"
        owner: globular
        group: globular
        mode: 0750

  - id: install-repository-service
    type: install_services
    units:
      - name: globular-repository.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular repository
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/repository
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          ExecStart={{.Prefix}}/bin/repository_server
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: ensure-repository-config
    type: ensure_service_config
    service_name: repository
    exec: repository_server
    address_host: auto
    rewrite_if_out_of_range: true

  - id: enable-repository
    type: enable_services
    services:
      - globular-repository.service

  - id: start-repository
    type: start_services
    services:
      - globular-repository.service
    binaries:
      globular-repository.service: repository_server

  - id: health-repository
    type: health_checks
    services:
      - globular-repository.service
