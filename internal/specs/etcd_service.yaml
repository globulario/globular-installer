version: 1
steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750

      - path: "{{.StateDir}}/etcd"
        owner: globular
        group: globular
        mode: 0750

      - path: "{{.ConfigDir}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.ConfigDir}}/etcd"
        owner: root
        group: root
        mode: 0755

  # Copies embedded assets/bin/* into {{.Prefix}}/bin
  # Must include the etcd binary at internal/assets/bin/etcd
  - id: install-binaries
    type: install_binaries

  # Writes the etcd config file.
  - id: install-etcd-config
    type: install_files
    files:
      - path: "{{.ConfigDir}}/etcd/etcd.yaml"
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          # REPLACE THIS WITH YOUR internal/assets/config/etcd/etcd.yaml CONTENT (kept in-sync by installer)
          name: "globular-etcd"
          data-dir: "{{.StateDir}}/etcd"

          listen-client-urls: "http://127.0.0.1:2379"
          advertise-client-urls: "http://127.0.0.1:2379"

          listen-peer-urls: "http://127.0.0.1:2380"
          initial-advertise-peer-urls: "http://127.0.0.1:2380"

          initial-cluster: "globular-etcd=http://127.0.0.1:2380"
          initial-cluster-state: "new"
          initial-cluster-token: "globular-etcd-cluster"

          logger: "zap"
          log-level: "info"
          log-outputs: ["stderr"]

          snapshot-count: 10000
          auto-compaction-mode: "periodic"
          auto-compaction-retention: "1h"
          quota-backend-bytes: 0

  # Installs the systemd unit for etcd.
  - id: install-etcd-service
    type: install_services
    units:
      - name: globular-etcd.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular etcd (embedded)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/etcd
          ExecStart={{.Prefix}}/bin/etcd --config-file {{.ConfigDir}}/etcd/etcd.yaml
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: start-etcd
    type: start_services
    services:
      - globular-etcd.service
    restart_on_files:
      globular-etcd.service:
        - "{{.ConfigDir}}/etcd/etcd.yaml"
    binaries:
      globular-etcd.service: etcd

  - id: health-etcd
    type: health_checks
    services:
      - globular-etcd.service

