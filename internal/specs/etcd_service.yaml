version: 1
steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/etcd"
        owner: globular
        group: globular
        mode: 0750

  - id: stage-etcd-package
    type: stage_package
    path: "internal/assets/packages/service.etcd_{{.Version}}_linux_amd64.tgz"
    require_platform_match: true
    require_type_service: true

  - id: install-etcd-bin
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  # etcd uses its own config format
  - id: install-etcd-config
    type: install_files
    files:
      - path: "{{.StateDir}}/etcd/etcd.yaml"
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          name: "globular-etcd"
          data-dir: "{{.StateDir}}/etcd"

          listen-client-urls: "http://127.0.0.1:2379"
          advertise-client-urls: "http://127.0.0.1:2379"

          listen-peer-urls: "http://127.0.0.1:2380"
          initial-advertise-peer-urls: "http://127.0.0.1:2380"

          initial-cluster: "globular-etcd=http://127.0.0.1:2380"
          initial-cluster-state: "new"
          initial-cluster-token: "globular-etcd-cluster"

          logger: "zap"
          log-level: "info"
          log-outputs: ["stderr"]

          snapshot-count: 10000
          auto-compaction-mode: "periodic"
          auto-compaction-retention: "1h"
          quota-backend-bytes: 0

  - id: install-etcd-service
    type: install_services
    units:
      - name: globular-etcd.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular etcd (embedded)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/etcd
          ExecStart={{.Prefix}}/bin/etcd --config-file {{.StateDir}}/etcd/etcd.yaml
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: start-etcd
    type: start_services
    services:
      - globular-etcd.service
    restart_on_files:
      globular-etcd.service:
        - "{{.StateDir}}/etcd/etcd.yaml"
    binaries:
      globular-etcd.service: etcd

  - id: health-etcd
    type: health_checks
    services:
      - globular-etcd.service
