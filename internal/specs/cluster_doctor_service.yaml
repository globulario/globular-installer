version: 1

metadata:
  name: cluster-doctor

service:
  name: cluster-doctor
  exec: clusterdoctor_server

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: globular
        group: globular
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: globular
        group: globular
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/cluster-doctor"
        owner: globular
        group: globular
        mode: 0750

      # TLS directories (certificates must be provisioned by Day-0 bootstrap)
      - path: "{{.StateDir}}/pki"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/config/tls"
        owner: globular
        group: globular
        mode: 0750

  - id: install-cluster-doctor-payload
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: install-cluster-doctor-service
    type: install_services
    units:
      - name: globular-cluster-doctor.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular Cluster Doctor
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/cluster-doctor
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          ExecStart={{.Prefix}}/bin/clusterdoctor_server
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-cluster-doctor
    type: enable_services
    services:
      - globular-cluster-doctor.service

  - id: start-cluster-doctor
    type: start_services
    services:
      - globular-cluster-doctor.service
    binaries:
      globular-cluster-doctor.service: clusterdoctor_server

  - id: health-cluster-doctor
    type: health_checks
    services:
      - globular-cluster-doctor.service
