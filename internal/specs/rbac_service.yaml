version: 1

metadata:
  name: rbac

service:
  name: rbac
  exec: rbac_server

steps:
  - id: stage-rbac-package
    type: stage_package
    path: "internal/assets/packages/service.rbac_{{.Version}}_linux_amd64.tgz"
    require_platform_match: true
    require_type_service: true

  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/rbac"
        owner: globular
        group: globular
        mode: 0750

  - id: install-rbac-service
    type: install_services
    units:
      - name: globular-rbac.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular rbac
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/rbac
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          ExecStart={{.Prefix}}/bin/rbac_server
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-rbac
    type: enable_services
    services:
      - globular-rbac.service

  - id: start-rbac
    type: start_services
    services:
      - globular-rbac.service
    binaries:
      globular-rbac.service: rbac_server

  - id: health-rbac
    type: health_checks
    services:
      - globular-rbac.service
