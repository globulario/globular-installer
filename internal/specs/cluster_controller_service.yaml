version: 1
steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/cluster-controller"
        owner: globular
        group: globular
        mode: 0750

  - id: install-cluster-controller-bin
    type: install_binaries

  - id: install-cluster-controller-service
    type: install_services
    units:
      - name: globular-cluster-controller.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular Cluster Controller
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=root
          Group=root
          WorkingDirectory={{.StateDir}}/cluster-controller
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          ExecStart={{.Prefix}}/bin/cluster_controller --state {{.StateDir}}/cluster-controller/state.json
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-cluster-controller
    type: enable_services
    services:
      - globular-cluster-controller.service

  - id: start-cluster-controller
    type: start_services
    services:
      - globular-cluster-controller.service
    binaries:
      globular-cluster-controller.service: cluster_controller

  - id: health-cluster-controller
    type: health_checks
    services:
      - globular-cluster-controller.service
