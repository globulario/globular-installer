version: 1
steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750

  - id: install-node-agent-service
    type: install_services
    units:
      - name: globular-node-agent.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular Node Agent
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}/services
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          Environment=NODE_AGENT_INSECURE=true
          Environment=NODE_AGENT_CONTROLLER_ENDPOINT=127.0.0.1:12000
          ExecStart={{.Prefix}}/bin/node_agent
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-node-agent
    type: enable_services
    services:
      - globular-node-agent.service

  - id: start-node-agent
    type: start_services
    services:
      - globular-node-agent.service
    binaries:
      globular-node-agent.service: node_agent

  - id: health-node-agent
    type: health_checks
    services:
      - globular-node-agent.service
