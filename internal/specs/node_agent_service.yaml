version: 1

metadata:
  name: node-agent

service:
  name: node-agent
  exec: node_agent

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: globular
        group: globular
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: globular
        group: globular
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750

      # TLS directories (certificates must be provisioned by Day-0 bootstrap)
      - path: "{{.StateDir}}/pki"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/config/tls"
        owner: globular
        group: globular
        mode: 0750

  - id: install-node-agent-binary
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: install-node-agent-service
    type: install_services
    units:
      - name: globular-node-agent.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular Node Agent
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=root
          Group=root
          WorkingDirectory={{.StateDir}}/services
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          Environment=NODE_AGENT_TLS_CERT={{.StateDir}}/config/tls/fullchain.pem
          Environment=NODE_AGENT_TLS_KEY={{.StateDir}}/config/tls/privkey.pem
          Environment=NODE_AGENT_TLS_CA={{.StateDir}}/pki/ca.pem
          Environment=NODE_AGENT_CONTROLLER_ENDPOINT=127.0.0.1:12000
          Environment=GLOBULAR_SKIP_SYSTEMD=1
          ExecStart={{.Prefix}}/bin/node_agent
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-node-agent
    type: enable_services
    services:
      - globular-node-agent.service

  - id: start-node-agent
    type: start_services
    services:
      - globular-node-agent.service
    binaries:
      globular-node-agent.service: node_agent

  - id: health-node-agent
    type: health_checks
    services:
      - globular-node-agent.service
