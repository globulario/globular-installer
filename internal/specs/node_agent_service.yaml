version: 1
steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750

      - path: "{{.ConfigDir}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.ConfigDir}}/node-agent"
        owner: root
        group: root
        mode: 0755

  # Stages the service package (created with `globular-cli pkg build`) into the installer staging directory.
  # NOTE: pass --version to globular-installer so {{.Version}} matches the package filename.
  - id: stage-node-agent-package
    type: stage_package
    path: "internal/assets/packages/service.node-agent_{{.Version}}_linux_amd64.tgz"
    require_platform_match: true
    require_type_service: true

  # Installs only binaries from the staged package into {{.Prefix}}/bin.
  # Config/systemd/spec are still installed from this spec because package payload files are copied verbatim (no templating).
  - id: install-node-agent-bin
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: install-node-agent-service
    type: install_services
    units:
      - name: globular-node-agent.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular Node Agent (embedded)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=globular
          Group=globular
          WorkingDirectory={{.StateDir}}
          ExecStart={{.Prefix}}/bin/node_agent
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: start-node-agent
    type: start_services
    services:
      - globular-node-agent.service
    binaries:
      globular-node-agent.service: node_agent

  - id: health-node-agent
    type: health_checks
    services:
      - globular-node-agent.service

